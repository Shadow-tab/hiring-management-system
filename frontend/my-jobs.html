<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Job Postings — Hiring MS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-text">Hiring MS</div>
        <div class="sidebar-logo-sub">Company Portal</div>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer"></div>
</aside>
<main class="main">
    <div class="page-header">
        <div class="page-header-left">
            <h1>My Job Postings</h1>
            <p>Positions posted by your company</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('addModal')">Add Job Posting</button>
    </div>
    <div class="card">
        <div class="card-header"><h2>All Positions</h2></div>
        <div id="table-body"><div class="loading">Fetching data</div></div>
    </div>
</main>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-title">Add Job Posting</div>
        <div class="modal-subtitle">Post a new position for your company.</div>
        <div class="form-row">
            <div class="form-group">
                <label>Job ID</label>
                <input type="number" id="f-jobid" placeholder="e.g. 5">
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" id="f-dept" placeholder="e.g. Engineering">
            </div>
        </div>
        <div class="form-group">
            <label>Job Title</label>
            <input type="text" id="f-title" placeholder="e.g. Backend Developer">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Employment Type</label>
                <select id="f-emptype">
                    <option value="Full-Time">Full-Time</option>
                    <option value="Part-Time">Part-Time</option>
                    <option value="Contract">Contract</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="f-status">
                    <option value="Open">Open</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Posted Date</label>
                <input type="date" id="f-posted">
            </div>
            <div class="form-group">
                <label>Closing Date</label>
                <input type="date" id="f-closing">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Salary Range</label>
                <input type="text" id="f-salary" placeholder="e.g. 80000-120000">
            </div>
            <div class="form-group">
                <label>Required Skills</label>
                <input type="text" id="f-skills" placeholder="e.g. Node.js, SQL">
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="f-desc" placeholder="Describe the role..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
            <button class="btn btn-primary" onclick="addJob()">Post Job</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script src="auth.js"></script>
<script>
    const user = requireAuth(['COMPANY']);
    if (user) {
        buildSidebar('my-jobs.html');
        function fmt(v) { if (!v) return '—'; return new Date(v).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }); }

        async function load() {
            const data = await get(`/api/my/jobs?company_id=${user.entity_id}`);
            const el = document.getElementById('table-body');
            if (!data || data.length === 0) { el.innerHTML = '<div class="empty"><div class="empty-title">No job postings yet</div><div class="empty-desc">Post your first job to start receiving applications.</div></div>'; return; }
            const rows = data.map(j => `<tr>
                <td>${j.JOB_ID ?? j.job_id}</td>
                <td>${j.TITLE ?? j.title}</td>
                <td>${j.DEPARTMENT ?? j.department ?? '—'}</td>
                <td>${j.EMP_TYPE ?? j.emp_type ?? '—'}</td>
                <td>${j.SALARY_RANGE ?? j.salary_range ?? '—'}</td>
                <td>${fmt(j.CLOSING_DATE ?? j.closing_date)}</td>
                <td>${badge(j.STATUS ?? j.status)}</td>
            </tr>`).join('');
            el.innerHTML = `<table><thead><tr><th>ID</th><th>Title</th><th>Department</th><th>Type</th><th>Salary</th><th>Closes</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`;
        }

        async function addJob() {
            const body = {
                job_id:          document.getElementById('f-jobid').value,
                company_id:      user.entity_id,
                title:           document.getElementById('f-title').value,
                department:      document.getElementById('f-dept').value,
                emp_type:        document.getElementById('f-emptype').value,
                posted_date:     document.getElementById('f-posted').value,
                closing_date:    document.getElementById('f-closing').value,
                salary_range:    document.getElementById('f-salary').value,
                status:          document.getElementById('f-status').value,
                required_skills: document.getElementById('f-skills').value,
                description:     document.getElementById('f-desc').value
            };
            if (!body.job_id || !body.title) { showToast('Job ID and title are required', 'error'); return; }
            const res = await post('/api/jobs', body);
            if (res?.message) { showToast('Job posted'); closeModal('addModal'); load(); }
            else showToast(res?.error || 'Failed', 'error');
        }

        load();
    }
</script>
</body>
</html>
