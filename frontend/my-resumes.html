<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resumes — Hiring MS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-text">Hiring MS</div>
        <div class="sidebar-logo-sub">Candidate Portal</div>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer"></div>
</aside>
<main class="main">
    <div class="page-header">
        <div class="page-header-left">
            <h1>My Resumes</h1>
            <p>Your uploaded resume versions</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('addModal')">Add Resume</button>
    </div>
    <div class="card">
        <div class="card-header"><h2>All Resumes</h2></div>
        <div id="table-body"><div class="loading">Fetching data</div></div>
    </div>
</main>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-title">Add Resume</div>
        <div class="modal-subtitle">Upload a new resume version.</div>
        <div class="form-row">
            <div class="form-group">
                <label>Resume ID</label>
                <input type="number" id="f-id" placeholder="e.g. 7">
            </div>
            <div class="form-group">
                <label>Version Label</label>
                <input type="text" id="f-version" placeholder="e.g. v1, Final">
            </div>
        </div>
        <div class="form-group">
            <label>File URL</label>
            <input type="text" id="f-url" placeholder="files/resume.pdf">
        </div>
        <div class="form-group">
            <label>Summary</label>
            <textarea id="f-summary" placeholder="Brief professional summary..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
            <button class="btn btn-primary" onclick="addResume()">Add</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script src="auth.js"></script>
<script>
    const user = requireAuth(['CANDIDATE']);
    if (user) {
        buildSidebar('my-resumes.html');
        async function load() {
            const data = await get(`/api/my/resumes?candidate_id=${user.entity_id}`);
            const el = document.getElementById('table-body');
            if (!data || data.length === 0) {
                el.innerHTML = '<div class="empty"><div class="empty-title">No resumes yet</div><div class="empty-desc">Add your first resume to start applying.</div></div>';
                return;
            }
            const rows = data.map(r => `<tr>
                <td>${r.RESUME_ID ?? r.resume_id}</td>
                <td>${r.VERSION_LABEL ?? r.version_label ?? '—'}</td>
                <td>${r.FILE_URL ?? r.file_url ?? '—'}</td>
                <td>${r.SUMMARY ?? r.summary ?? '—'}</td>
                <td>${new Date(r.UPLOAD_DATE ?? r.upload_date).toLocaleDateString('en-GB')}</td>
            </tr>`).join('');
            el.innerHTML = `<table><thead><tr><th>ID</th><th>Version</th><th>File</th><th>Summary</th><th>Uploaded</th></tr></thead><tbody>${rows}</tbody></table>`;
        }
        async function addResume() {
            const body = {
                resume_id:     document.getElementById('f-id').value,
                candidate_id:  user.entity_id,
                version_label: document.getElementById('f-version').value,
                file_url:      document.getElementById('f-url').value,
                summary:       document.getElementById('f-summary').value
            };
            if (!body.resume_id) { showToast('Resume ID is required', 'error'); return; }
            const res = await post('/api/resumes', body);
            if (res?.message) { showToast('Resume added'); closeModal('addModal'); load(); }
            else showToast(res?.error || 'Failed', 'error');
        }
        load();
    }
</script>
</body>
</html>
