<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers — Hiring MS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-text">Hiring MS</div>
        <div class="sidebar-logo-sub"></div>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer"></div>
</aside>
<main class="main">
    <div class="page-header">
        <div class="page-header-left">
            <h1 id="page-title">Offers</h1>
            <p id="page-sub"></p>
        </div>
        <div id="add-btn"></div>
    </div>
    <div class="card">
        <div class="card-header"><h2>Offers</h2></div>
        <div id="table-body"><div class="loading">Fetching data</div></div>
    </div>
</main>

<!-- Add Offer Modal (Company only) -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-title">Make an Offer</div>
        <div class="modal-subtitle">Extend an offer to a candidate.</div>
        <div class="form-row">
            <div class="form-group">
                <label>Offer ID</label>
                <input type="number" id="f-id" placeholder="e.g. 2">
            </div>
            <div class="form-group">
                <label>Application ID</label>
                <input type="number" id="f-appid" placeholder="e.g. 2">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Base Salary</label>
                <input type="number" id="f-salary" placeholder="e.g. 90000">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="f-status">
                    <option value="Pending">Pending</option>
                    <option value="Accepted">Accepted</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Offer Date</label>
                <input type="date" id="f-offerdate">
            </div>
            <div class="form-group">
                <label>Start Date</label>
                <input type="date" id="f-startdate">
            </div>
        </div>
        <div class="form-group">
            <label>Benefits Summary</label>
            <textarea id="f-benefits" placeholder="e.g. Health insurance, 15 days leave..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
            <button class="btn btn-primary" onclick="addOffer()">Make Offer</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script src="auth.js"></script>
<script>
    const user = requireAuth(['CANDIDATE', 'COMPANY']);
    if (user) {
        buildSidebar('my-offers.html');
        function fmt(v) { if (!v) return '—'; return new Date(v).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }); }

        async function load() {
            const el = document.getElementById('table-body');
            let data;

            if (user.role === 'CANDIDATE') {
                document.getElementById('page-title').textContent = 'My Offers';
                document.getElementById('page-sub').textContent   = 'Job offers extended to you';
                document.querySelector('.sidebar-logo-sub').textContent = 'Candidate Portal';
                data = await get(`/api/my/offers?candidate_id=${user.entity_id}`);
                if (!data || data.length === 0) { el.innerHTML = '<div class="empty"><div class="empty-title">No offers yet</div><div class="empty-desc">Offers will appear here once extended.</div></div>'; return; }
                const rows = data.map(o => `<tr>
                    <td>${o.OFFER_ID ?? o.offer_id}</td>
                    <td>${o.JOB_TITLE ?? o.job_title}</td>
                    <td>PKR ${Number(o.BASE_SALARY ?? o.base_salary).toLocaleString()}</td>
                    <td>${fmt(o.OFFER_DATE ?? o.offer_date)}</td>
                    <td>${fmt(o.START_DATE ?? o.start_date)}</td>
                    <td>${badge(o.STATUS ?? o.status)}</td>
                </tr>`).join('');
                el.innerHTML = `<table><thead><tr><th>ID</th><th>Job</th><th>Salary</th><th>Offer Date</th><th>Start Date</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`;

            } else if (user.role === 'COMPANY') {
                document.getElementById('page-title').textContent = 'Offers Made';
                document.getElementById('page-sub').textContent   = 'Offers you have extended to candidates';
                document.querySelector('.sidebar-logo-sub').textContent = 'Company Portal';
                document.getElementById('add-btn').innerHTML = '<button class="btn btn-primary" onclick="openModal(\'addModal\')">Make Offer</button>';
                data = await get(`/api/my/company-offers?company_id=${user.entity_id}`);
                if (!data || data.length === 0) { el.innerHTML = '<div class="empty"><div class="empty-title">No offers made yet</div></div>'; return; }
                const rows = data.map(o => `<tr>
                    <td>${o.OFFER_ID ?? o.offer_id}</td>
                    <td>${o.CANDIDATE_NAME ?? o.candidate_name}</td>
                    <td>${o.JOB_TITLE ?? o.job_title}</td>
                    <td>PKR ${Number(o.BASE_SALARY ?? o.base_salary).toLocaleString()}</td>
                    <td>${fmt(o.OFFER_DATE ?? o.offer_date)}</td>
                    <td>${badge(o.STATUS ?? o.status)}</td>
                </tr>`).join('');
                el.innerHTML = `<table><thead><tr><th>ID</th><th>Candidate</th><th>Job</th><th>Salary</th><th>Date</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`;
            }
        }

        async function addOffer() {
            const body = {
                offer_id: document.getElementById('f-id').value,
                application_id: document.getElementById('f-appid').value,
                base_salary: document.getElementById('f-salary').value,
                status: document.getElementById('f-status').value,
                offer_date: document.getElementById('f-offerdate').value,
                start_date: document.getElementById('f-startdate').value,
                benefits_summary: document.getElementById('f-benefits').value
            };
            if (!body.offer_id || !body.application_id || !body.base_salary) { showToast('Offer ID, application ID and salary are required', 'error'); return; }
            const res = await post('/api/offers', body);
            if (res?.message) { showToast('Offer made'); closeModal('addModal'); load(); }
            else showToast(res?.error || 'Failed', 'error');
        }

        load();
    }
</script>
</body>
</html>
